<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bank Robbers</title>
    <link rel="stylesheet" href="data/css/index.min.css">
    <link rel="stylesheet" href="../lib/sweetalert2/sweetalert2.min.css">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="../share/js/global.min.js"></script>
    <script src="../lib/sweetalert2/sweetalert2.min.js"></script>
    <script src="data/js/index.min.js"></script>
</head>

<body>
    <div class="player" id="Player" style="left:3%; bottom: 5%">
        <h6>Player</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Player</span>
        </div>
    </div>

    <div class="player" id="Com1" style="left:3%; top: 42.5%">
        <h6>Com1</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Com1</span>
        </div>
    </div>

    <div class="player" id="Com2" style="left:3%; top: 5%">
        <h6>Com2</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Com2</span>
        </div>
    </div>

    <div class="player" id="Com3" style="left:23%; top: 5%">
        <h6>Com3</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Com3</span>
        </div>
    </div>

    <div class="player" id="Com4" style="left:43%; top: 5%">
        <h6>Com4</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Com4</span>
        </div>
    </div>

    <div class="player" id="Com5" style="left:63%; top: 5%">
        <h6>Com5</h6>
        <div class="label">
            <img src="data/img/money.png" width="20px" height="20px" loading="lazy">
            <p id="money">1000</p>
            <span class="add" id="variation">+0000</span>
        </div>
        <div class="label">
            <p id="operation">偷</p>
            <span id="target">Com5</span>
        </div>
    </div>

    <div class="info">
        <h5>Round <span id="round">0</span> / 21</h5>
        <h5>Stage <span id="stage">0</span> / 3</h5>
        <p>Current parameters: </p>
        <ul>
            <li>攻: <span id="attack">0000</span></li>
            <li>守: <span id="defence">000</span></li>
            <li>偷: <span id="stolen">0.00</span></li>
        </ul>
        <h5 style="color: red; font-style: italic;">Goal: 25000!</h5>
    </div>

    <div class="contorl">
        <div id="operationLabel">
            <button id="attBtn">攻</button>
            <button id="defBtn">守</button>
            <button id="stoBtn">偷</button>
        </div>
        <div id="targetLabel">
            <div style="height: 45%">
                <button id="c1">Com 1</button>
                <button id="c2">Com 2</button>
                <button id="c3">Com 3</button>
            </div>
            <div style="height: 45%">
                <button id="c4">Com 4</button>
                <button id="c5">Com 5</button>
                <button id="cancel">Cancel</button>
            </div>
        </div>
    </div>

    <div class="logs">
        <p id="log1">等待游戏初始化</p>
        <p id="log2"></p>
        <p id="log3"></p>
        <p id="log4"></p>
        <p id="log5"></p>
        <p id="log6"></p>
    </div>
    
    <div id="footer">
        <a href="../index.html">About</a>
    </div>
</body>

</html>
